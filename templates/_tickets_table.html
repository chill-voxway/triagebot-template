<table class="min-w-full divide-y divide-slate-200 bg-white shadow-sm ring-1 ring-slate-200 rounded-lg overflow-hidden">
  <thead class="bg-slate-100">
    <tr>
      <th class="px-3 py-2 text-left text-sm font-semibold">ID</th>
      <th class="px-3 py-2 text-left text-sm font-semibold">Título</th>
      <th class="px-3 py-2 text-left text-sm font-semibold">Categoría</th>
      <th class="px-3 py-2 text-left text-sm font-semibold">Prioridad</th>
      <th class="px-3 py-2 text-left text-sm font-semibold">Tags</th>
      <th class="px-3 py-2 text-left text-sm font-semibold">Estado</th>
      <th class="px-3 py-2 text-left text-sm font-semibold">Creado</th>
    </tr>
  </thead>
  <tbody id="tickets-table-body" class="divide-y divide-slate-100">
    {% for ticket in tickets %}
    <tr class="hover:bg-slate-50">
      <td class="px-3 py-2 text-sm text-slate-500">{{ ticket.id }}</td>
      <td class="px-3 py-2 text-sm font-medium">{{ ticket.title }}</td>
      <td class="px-3 py-2 text-sm">{{ ticket.category }}</td>
      <td class="px-3 py-2 text-sm font-semibold">{{ ticket.priority }}</td>
      <td class="px-3 py-2 text-sm text-slate-500">{{ ticket.tags | join(", ") }}</td>
      <td class="px-3 py-2 text-sm">{{ ticket.status }}</td>
      <td class="px-3 py-2 text-sm text-slate-400">{{ ticket.created_at[:19] }}</td>
    </tr>
    {% else %}
    <tr>
      <td colspan="7" class="px-3 py-4 text-center text-sm text-slate-400">No hay tickets.</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
